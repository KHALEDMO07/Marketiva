<!DOCTYPE html>
<html lang="en">

<head>

    <title>Home - Marketiva</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../Styles/Home.css">

<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">Marke<span>tiva</span></div>

    <header class="slider-section">
        <div class="slider">
            <div class="slides" id="slides-container">

        </div>

    <main class="content">
        <section class="filters" id="filter-buttons">
            <button class="filter-btn active" data-filter="All">All Products</button>
            <button class="filter-btn" data-filter="Clothes">Clothes</button>
            <button class="filter-btn" data-filter="Makeup">Makeup</button>
            <button class="filter-btn" data-filter="Phones">Phones</button>

        <section class="product-grid" id="product-list">
