<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Marketiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../Styles/Register.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">Marke<span>tiva</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="https://mail.google.com/mail/?view=cm&fs=1&to=khaledmohammedoosh@gmail.com">Contact</a>
                </li>
                <div id="auth-links" class="auth-links">
                    <li><a href="Login.html">Login</a></li>
                    <li><a href="Register.html" class="auth-btn primary active">Register</a></li>
                </div>
            </ul>
        </div>
    </nav>

    <main class="auth-wrapper">
        <div class="auth-card">
            <h1>Create Account</h1>
            <p class="subtitle">Join our community today</p>
            <form class="auth-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Confirm your password" required>
                </div>
                <button type="submit" id="submit" class="auth-submit-btn">Register</button>
            </form>
            <div class="auth-footer">
                Already have an account? <a href="Login.html">Login Here</a>
            </div>
        </div>
    </main>

    <div id="messageBox" class="message-box">
        <div id="messageIcon" class="icon"></div>
        <p id="messageText"></p>
    </div>


    <script src="../Scripts/Models.js"></script>
    <script src="../Scripts/Common.js"></script>
    <script src="../Scripts/Register.js"></script>
</body>

</html>
